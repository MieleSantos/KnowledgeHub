services:
  api:
    build:
      context: .
      dockerfile: knowledge_hub/Dockerfile
    container_name: book-catalog-api
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
    volumes:
      - ./knowledge_hub/books.db:/app/books.db
      - ./knowledge_hub/app/services/semantic_search/data:/app/data
    restart: unless-stopped

  streamlit-hub:
    build:
      context: .
      dockerfile: streamlit_hub/Dockerfile
    container_name: streamlit-hub
    ports:
      - "8501:8501"
    environment:
      - API_BASE_URL=http://api:8000
    depends_on:
      - api
    restart: unless-stopped
